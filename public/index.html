<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Projekt Yggdrasil — Esims · Oddin.gg</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=JetBrains+Mono:wght@300;400;500&family=Inter+Tight:wght@300;400;500;600&display=swap">
<style>:root {
  --bg: #07090e;
  --bg-2: #0b0e15;
  --ink: #e9ecf2;
  --ink-dim: #8a93a6;
  --ink-faint: #3a4256;
  --rule: #1a2030;
  --accent: #7dd3fc;
  --accent-glow: rgba(125, 211, 252, 0.35);
  --danger: #f87171;
  --warn: #f59e0b;
  --ok: #34d399;

  --f-display: "Fraunces", ui-serif, Georgia, serif;
  --f-body: "Inter Tight", ui-sans-serif, system-ui, sans-serif;
  --f-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, monospace;

  --gutter: clamp(20px, 4vw, 56px);
  --maxw: 1440px;
}

[data-theme="light"] {
  --bg: #f6f4ee;
  --bg-2: #efece3;
  --ink: #12151c;
  --ink-dim: #5c6372;
  --ink-faint: #b7bcc7;
  --rule: #d9d5c8;
  --accent-glow: rgba(37, 99, 235, 0.18);
}

[data-accent="cyan"]   { --accent: #7dd3fc; --accent-glow: rgba(125,211,252,.35); }
[data-accent="violet"] { --accent: #a78bfa; --accent-glow: rgba(167,139,250,.35); }
[data-accent="green"]  { --accent: #34d399; --accent-glow: rgba(52,211,153,.30); }
[data-accent="amber"]  { --accent: #f59e0b; --accent-glow: rgba(245,158,11,.30); }
[data-accent="bone"]   { --accent: #f5f0d6; --accent-glow: rgba(245,240,214,.28); }
[data-accent="red"]    { --accent: #ef4444; --accent-glow: rgba(239,68,68,.30); }

[data-theme="light"][data-accent="cyan"]   { --accent: #0284c7; }
[data-theme="light"][data-accent="violet"] { --accent: #6d28d9; }
[data-theme="light"][data-accent="green"]  { --accent: #059669; }
[data-theme="light"][data-accent="amber"]  { --accent: #b45309; }
[data-theme="light"][data-accent="bone"]   { --accent: #5c4a1c; }
[data-theme="light"][data-accent="red"]    { --accent: #b91c1c; }

* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--ink);
  font-family: var(--f-body);
  font-weight: 400;
  font-size: 16px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
body {
  min-height: 100vh;
  overflow-x: hidden;
}

::selection { background: var(--accent); color: var(--bg); }

a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

/* ---------- chrome ---------- */
.nav {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 20px var(--gutter);
  display: flex; align-items: center; justify-content: space-between;
  z-index: 50;
  mix-blend-mode: difference;
  color: #fff;
  pointer-events: none;
}
.nav > * { pointer-events: auto; }
.nav-mark {
  font-family: var(--f-display);
  font-weight: 400;
  font-style: italic;
  font-size: 17px;
  letter-spacing: -0.01em;
  display: flex; align-items: center; gap: 10px;
}
.nav-mark .glyph {
  display: inline-block; width: 18px; height: 18px;
  border-radius: 50%; border: 1px solid currentColor;
  position: relative;
}
.nav-mark .glyph::before, .nav-mark .glyph::after {
  content: ''; position: absolute; inset: 0;
  border-radius: 50%;
  border-top: 1px solid currentColor;
  transform: rotate(45deg);
}
.nav-mark .glyph::after { transform: rotate(-45deg); }

.nav-links {
  display: flex; gap: 28px;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.nav-links a { opacity: 0.75; transition: opacity .2s; }
.nav-links a:hover { opacity: 1; }

.nav-meta {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0.75;
  display: flex; gap: 18px;
  align-items: center;
}
.nav-meta .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ok); box-shadow: 0 0 10px var(--ok);
  display: inline-block; margin-right: 6px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ---------- shared ---------- */
.eyebrow {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-dim);
  display: inline-flex; align-items: center; gap: 10px;
}
.eyebrow::before {
  content: ''; width: 24px; height: 1px; background: var(--accent);
  display: inline-block;
}
.rule {
  border: none; border-top: 1px solid var(--rule);
  margin: 0;
}
.section {
  padding: clamp(72px, 10vh, 140px) var(--gutter);
  max-width: var(--maxw);
  margin: 0 auto;
  position: relative;
}

.h-display {
  font-family: var(--f-display);
  font-weight: 300;
  letter-spacing: -0.03em;
  line-height: 0.92;
  font-size: clamp(48px, 9vw, 148px);
}
.h-display em {
  font-style: italic;
  font-weight: 300;
  color: var(--ink-dim);
}

.h-section {
  font-family: var(--f-display);
  font-weight: 300;
  letter-spacing: -0.025em;
  line-height: 0.95;
  font-size: clamp(36px, 5.6vw, 82px);
  margin: 0;
}
.h-section em { font-style: italic; color: var(--ink-dim); }

.lede {
  font-family: var(--f-display);
  font-weight: 300;
  font-size: clamp(20px, 2.2vw, 30px);
  line-height: 1.3;
  letter-spacing: -0.01em;
  max-width: 42ch;
  color: var(--ink);
}

.mono {
  font-family: var(--f-mono);
  font-size: 12px;
  letter-spacing: 0.04em;
  color: var(--ink-dim);
}

/* ---------- hero ---------- */
.hero {
  min-height: 100vh;
  position: relative;
  display: grid;
  grid-template-rows: auto 1fr auto;
  padding: 120px var(--gutter) 48px;
  gap: 24px;
}
.hero-stage {
  position: relative;
  width: 100%;
  min-height: 720px;
}
.tree-wrap svg { width: 100%; height: 100%; max-width: 1600px; display: block; }
.hero-copy {
  position: relative;
  z-index: 3;
  text-align: center;
  pointer-events: none;
}
.hero-copy .eyebrow { justify-content: center; margin-bottom: 22px; }
.hero-title {
  font-family: var(--f-display);
  font-weight: 300;
  font-size: clamp(68px, 13vw, 220px);
  line-height: 0.88;
  letter-spacing: -0.045em;
  margin: 0;
}
.hero-title .slash {
  color: var(--accent);
  font-style: normal;
}
.hero-sub {
  margin-top: 72px;
  font-family: var(--f-body);
  font-size: clamp(13px, 1vw, 15px);
  color: var(--ink-dim);
  letter-spacing: 0.02em;
  max-width: 46ch;
  margin-left: auto; margin-right: auto;
}

.tree-wrap {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  z-index: 1;
}
/* (svg sizing defined near .hero-stage) */

.hero-foot {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: end;
  gap: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--rule);
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-dim);
}
.hero-foot .center {
  text-align: center;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.hero-foot .right { text-align: right; }
.scroll-indicator {
  display: inline-flex; align-items: center; gap: 8px;
}
.scroll-indicator .bar {
  display: inline-block; width: 40px; height: 1px;
  background: linear-gradient(to right, var(--accent), transparent);
  position: relative;
}
.scroll-indicator .bar::after {
  content: ''; position: absolute; top: -1px; height: 3px; width: 8px;
  background: var(--accent);
  animation: slide 2.4s infinite;
}
@keyframes slide {
  0% { left: 0; opacity: 1; }
  80% { left: 32px; opacity: 0; }
  100% { left: 32px; opacity: 0; }
}

/* ---------- manifesto ---------- */
.manifesto {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: clamp(32px, 6vw, 80px);
  align-items: start;
}
.manifesto .side .eyebrow { margin-bottom: 18px; }
.manifesto .side .mono { max-width: 24ch; }
.manifesto p {
  font-family: var(--f-display);
  font-weight: 300;
  font-size: clamp(24px, 2.6vw, 40px);
  line-height: 1.2;
  letter-spacing: -0.018em;
  text-wrap: pretty;
  margin: 0;
  color: var(--ink);
}
.manifesto p + p { margin-top: 0.6em; color: var(--ink-dim); }
.manifesto em { font-style: italic; }
.manifesto .mark {
  color: var(--accent);
  font-style: italic;
}

/* ---------- architecture ---------- */
.arch {
  display: grid;
  grid-template-columns: 5fr 7fr;
  gap: clamp(24px, 5vw, 64px);
  align-items: start;
}
.arch-vis {
  aspect-ratio: 1 / 1;
  border: 1px solid var(--rule);
  position: relative;
  background:
    radial-gradient(circle at center, color-mix(in oklab, var(--accent) 6%, transparent), transparent 60%),
    var(--bg-2);
}
.arch-vis svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.arch-text h3 { margin: 0 0 12px; }
.arch-steps {
  margin-top: 28px;
  display: grid;
  gap: 0;
  border-top: 1px solid var(--rule);
}
.arch-step {
  display: grid;
  grid-template-columns: 60px 1fr 120px;
  gap: 16px;
  padding: 18px 0;
  border-bottom: 1px solid var(--rule);
  align-items: baseline;
}
.arch-step .n {
  font-family: var(--f-mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.1em;
}
.arch-step .name {
  font-family: var(--f-display);
  font-weight: 300;
  font-size: clamp(18px, 1.6vw, 24px);
  letter-spacing: -0.01em;
}
.arch-step .desc {
  grid-column: 2;
  color: var(--ink-dim);
  font-size: 14px;
  margin-top: 4px;
  max-width: 56ch;
}
.arch-step .tag {
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-dim);
  text-align: right;
}

/* ---------- projects ---------- */
.projects-head {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 40px;
  align-items: end;
  margin-bottom: 48px;
}
.projects-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
}
.project-card {
  grid-column: span 6;
  background: var(--bg);
  padding: 28px;
  min-height: 320px;
  position: relative;
  cursor: pointer;
  display: grid;
  grid-template-rows: auto 1fr auto;
  transition: background .25s ease, color .25s ease;
  overflow: hidden;
  isolation: isolate;
}
.project-card::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 20% 0%, color-mix(in oklab, var(--accent) 28%, transparent), transparent 55%);
  opacity: 0;
  transition: opacity .35s ease;
  pointer-events: none;
  z-index: 0;
}
.project-card:hover::before { opacity: 1; }
.project-card > * { position: relative; z-index: 1; }
.project-card .top {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 12px;
}
.project-card .code {
  font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.1em;
  color: var(--ink-dim); text-transform: uppercase;
}
.project-card .status {
  font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 8px;
}
.status .d {
  width: 6px; height: 6px; border-radius: 50%;
}
.status.live .d { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
.status.beta .d { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
.status.dev  .d { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
.status.plan .d { background: var(--ink-faint); }

.project-card h3 {
  font-family: var(--f-display);
  font-weight: 300;
  font-size: clamp(28px, 3vw, 44px);
  letter-spacing: -0.025em;
  margin: 40px 0 8px;
  line-height: 1;
}
.project-card h3 em { font-style: italic; color: var(--ink-dim); }
.project-card .desc {
  color: var(--ink-dim);
  max-width: 44ch;
  font-size: 14px;
}
.project-card .bottom {
  display: flex; justify-content: space-between; align-items: end;
  margin-top: 24px;
  gap: 12px;
}
.project-card .metrics {
  display: flex; gap: 24px;
}
.project-card .metric .k {
  font-family: var(--f-display); font-weight: 300;
  font-size: clamp(20px, 2vw, 28px);
  line-height: 1;
}
.project-card .metric .l {
  font-family: var(--f-mono); font-size: 10px;
  color: var(--ink-dim); letter-spacing: 0.1em; text-transform: uppercase;
  margin-top: 4px;
}
.project-card .arrow {
  font-family: var(--f-mono); font-size: 22px;
  align-self: end;
  transform: translateX(0);
  transition: transform .3s cubic-bezier(.2,.8,.2,1);
  color: var(--accent);
}
.project-card:hover .arrow { transform: translate(6px, -6px); }

.project-card.ghost {
  opacity: 0.6;
}
.project-card.ghost h3 { color: var(--ink-dim); }

/* ---------- telemetry ---------- */
.telemetry {
  background: var(--bg-2);
}
.telemetry-inner {
  padding: clamp(56px, 8vh, 100px) var(--gutter);
  max-width: var(--maxw); margin: 0 auto;
}
.telemetry-head {
  display: flex; justify-content: space-between; align-items: end;
  gap: 24px; margin-bottom: 40px;
}
.telem-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--rule);
  border: 1px solid var(--rule);
}
.telem-cell {
  background: var(--bg-2);
  padding: 24px;
  display: grid; gap: 12px;
  min-height: 180px;
  grid-template-rows: auto 1fr auto;
}
.telem-cell .l {
  font-family: var(--f-mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--ink-dim);
}
.telem-cell .v {
  font-family: var(--f-display); font-weight: 300;
  font-size: clamp(32px, 3.5vw, 52px);
  letter-spacing: -0.02em;
  line-height: 1;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.telem-cell .v .u {
  font-family: var(--f-mono);
  font-size: 13px; color: var(--ink-dim);
  margin-left: 6px;
  letter-spacing: 0.05em;
}
.telem-cell .foot {
  font-family: var(--f-mono); font-size: 10px;
  color: var(--ink-dim); letter-spacing: 0.08em;
  display: flex; justify-content: space-between;
}
.telem-cell .foot .delta { color: var(--ok); }
.telem-cell .foot .delta.down { color: var(--danger); }
.spark { height: 36px; width: 100%; }

/* log stream */
.log {
  grid-column: span 4;
  background: var(--bg);
  padding: 18px 24px;
  font-family: var(--f-mono); font-size: 12px;
  color: var(--ink-dim);
  max-height: 160px; overflow: hidden;
  position: relative;
}
.log::after {
  content: '';
  position: absolute; left: 0; right: 0; bottom: 0; height: 60px;
  background: linear-gradient(to bottom, transparent, var(--bg));
  pointer-events: none;
}
.log .row { display: grid; grid-template-columns: 80px 70px 1fr; gap: 18px; padding: 3px 0; }
.log .t { color: var(--accent); }
.log .lvl { text-transform: uppercase; letter-spacing: 0.1em; font-size: 10px; }
.log .lvl.info { color: var(--ink-dim); }
.log .lvl.ok { color: var(--ok); }
.log .lvl.warn { color: var(--warn); }

/* ---------- timeline ---------- */
.timeline-wrap { position: relative; }
.timeline {
  display: grid;
  grid-template-columns: 1fr;
  border-top: 1px solid var(--rule);
}
.tl-row {
  display: grid;
  grid-template-columns: 120px 1fr 2fr 1fr;
  gap: 24px;
  padding: 22px 0;
  border-bottom: 1px solid var(--rule);
  align-items: baseline;
  transition: padding .3s ease;
}
.tl-row:hover {
  padding-left: 12px;
}
.tl-row .when {
  font-family: var(--f-mono); font-size: 12px;
  color: var(--accent); letter-spacing: 0.08em;
}
.tl-row .t {
  font-family: var(--f-display); font-weight: 300;
  font-size: clamp(20px, 2vw, 30px); letter-spacing: -0.015em; line-height: 1.1;
}
.tl-row .d { color: var(--ink-dim); font-size: 14px; max-width: 54ch; }
.tl-row .tag {
  font-family: var(--f-mono); font-size: 10px;
  color: var(--ink-dim); letter-spacing: 0.1em; text-transform: uppercase;
  text-align: right;
}

/* ---------- team ---------- */
.team-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--rule);
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
  margin-top: 40px;
}
.team-cell {
  background: var(--bg);
  padding: 24px;
  min-height: 180px;
  display: grid;
  grid-template-rows: 1fr auto;
}
.team-cell .name {
  font-family: var(--f-display); font-weight: 300;
  font-size: clamp(22px, 2vw, 30px); letter-spacing: -0.015em;
  line-height: 1.05;
}
.team-cell .role {
  margin-top: 8px;
  font-family: var(--f-mono); font-size: 10px; text-transform: uppercase;
  letter-spacing: 0.14em; color: var(--ink-dim);
}
.team-cell .initials {
  width: 34px; height: 34px;
  border: 1px solid var(--accent); color: var(--accent);
  display: grid; place-items: center;
  font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.1em;
  border-radius: 50%;
  margin-top: auto;
}

/* ---------- cta ---------- */
.cta {
  padding: clamp(80px, 14vh, 180px) var(--gutter);
  max-width: var(--maxw); margin: 0 auto;
  text-align: center;
  position: relative;
}
.cta .h-display { text-wrap: balance; }
.cta-row {
  margin-top: 48px;
  display: inline-flex; gap: 12px;
  flex-wrap: wrap; justify-content: center;
}
.btn {
  display: inline-flex; align-items: center; gap: 14px;
  padding: 16px 24px;
  font-family: var(--f-mono); font-size: 12px; letter-spacing: 0.12em;
  text-transform: uppercase;
  border: 1px solid var(--rule);
  transition: border-color .2s, background .2s, color .2s;
}
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn.primary {
  background: var(--accent); color: var(--bg); border-color: var(--accent);
}
.btn.primary:hover { filter: brightness(1.08); }
.btn .a { transition: transform .2s; }
.btn:hover .a { transform: translateX(4px); }

/* ---------- footer ---------- */
.footer {
  padding: 40px var(--gutter);
  border-top: 1px solid var(--rule);
  display: flex; justify-content: space-between; flex-wrap: wrap;
  gap: 18px;
  font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.1em;
  color: var(--ink-dim);
  text-transform: uppercase;
}

/* ---------- overlay ---------- */
.overlay {
  position: fixed; inset: 0; z-index: 200;
  display: grid; place-items: stretch;
  pointer-events: none;
  opacity: 0;
  transition: opacity .3s ease;
}
.overlay.open { opacity: 1; pointer-events: auto; }
.overlay-scrim {
  position: absolute; inset: 0;
  background: color-mix(in oklab, var(--bg) 80%, black);
  backdrop-filter: blur(12px);
}
.overlay-panel {
  position: relative;
  justify-self: end;
  width: min(720px, 94vw);
  height: 100%;
  background: var(--bg);
  border-left: 1px solid var(--rule);
  padding: clamp(32px, 4vw, 56px);
  overflow-y: auto;
  transform: translateX(40px);
  opacity: 0;
  transition: transform .35s cubic-bezier(.2,.8,.2,1), opacity .3s;
}
.overlay.open .overlay-panel {
  transform: translateX(0);
  opacity: 1;
}
.overlay-top {
  display: flex; justify-content: space-between; align-items: baseline;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 24px;
  margin-bottom: 36px;
}
.overlay h2 {
  font-family: var(--f-display); font-weight: 300;
  font-size: clamp(40px, 5vw, 72px);
  letter-spacing: -0.03em;
  line-height: 0.95;
  margin: 0;
}
.overlay h2 em { font-style: italic; color: var(--ink-dim); }
.overlay .lede { margin: 28px 0; }
.close {
  width: 40px; height: 40px; border: 1px solid var(--rule);
  display: grid; place-items: center;
  font-family: var(--f-mono);
  transition: border-color .2s, color .2s;
}
.close:hover { border-color: var(--accent); color: var(--accent); }
.ov-meta {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 24px;
  margin: 36px 0;
  padding: 24px 0;
  border-top: 1px solid var(--rule);
  border-bottom: 1px solid var(--rule);
}
.ov-meta .k { font-family: var(--f-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-dim); margin-bottom: 6px; }
.ov-meta .v { font-family: var(--f-display); font-weight: 300; font-size: clamp(18px, 1.5vw, 22px); letter-spacing: -0.01em; }

.ov-sect h4 {
  font-family: var(--f-mono); font-size: 11px; letter-spacing: 0.14em;
  text-transform: uppercase; color: var(--ink-dim);
  margin: 0 0 14px;
}
.ov-sect p { color: var(--ink); font-size: 15px; line-height: 1.55; text-wrap: pretty; }
.ov-sect + .ov-sect { margin-top: 28px; }

.ov-bullets { list-style: none; padding: 0; margin: 0; display: grid; gap: 10px; }
.ov-bullets li {
  display: grid; grid-template-columns: 24px 1fr;
  gap: 12px; font-size: 14px; color: var(--ink-dim);
}
.ov-bullets li::before {
  content: '→'; color: var(--accent); font-family: var(--f-mono);
}
.ov-bullets li span { color: var(--ink); }

/* ---------- tweaks ---------- */
.tweaks-panel {
  position: fixed; right: 20px; bottom: 20px; z-index: 300;
  background: var(--bg);
  border: 1px solid var(--rule);
  padding: 16px;
  min-width: 240px;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  box-shadow: 0 20px 60px rgba(0,0,0,0.45);
}
.tweaks-title {
  display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 12px; border-bottom: 1px solid var(--rule);
  margin-bottom: 14px;
}
.tweaks-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
}
.tweaks-row label { color: var(--ink-dim); font-size: 10px; }
.swatches { display: inline-flex; gap: 4px; }
.swatch {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1px solid var(--rule);
  cursor: pointer;
  transition: transform .15s;
}
.swatch.active { border-color: var(--ink); transform: scale(1.15); }
.seg {
  display: inline-flex; border: 1px solid var(--rule);
}
.seg button {
  padding: 4px 10px; font-family: var(--f-mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-dim);
}
.seg button.active { background: var(--accent); color: var(--bg); }

.slider-row input[type=range] {
  accent-color: var(--accent);
  width: 100px;
}

/* ---------- tree nodes ---------- */
.tree-node-label {
  font-family: var(--f-mono);
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  fill: var(--ink);
  pointer-events: auto;
  cursor: pointer;
}
.tree-node-label.dim { fill: var(--ink-dim); }
.tree-node-code {
  font-family: var(--f-mono);
  font-size: 9px;
  letter-spacing: 0.08em;
  fill: var(--ink-faint);
  text-transform: uppercase;
}
.tree-core-label {
  font-family: var(--f-display);
  font-weight: 300;
  font-style: italic;
  font-size: 12px;
  fill: var(--ink);
  letter-spacing: 0.02em;
}

/* ---------- subprojects & changelog in overlay ---------- */
.subprojects {
  display: grid;
  gap: 14px;
  margin-top: 12px;
}
.subproject {
  padding: 14px 16px;
  border: 1px solid var(--rule);
  background: color-mix(in oklab, var(--accent) 3%, var(--bg-2));
}
.sp-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 10px;
}
.sp-name {
  font-family: var(--f-display);
  font-weight: 400;
  font-size: 18px;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.sp-pct {
  font-family: var(--f-mono);
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 0.04em;
  font-variant-numeric: tabular-nums;
}
.sp-bar {
  height: 2px;
  background: var(--rule);
  position: relative;
  overflow: hidden;
}
.sp-fill {
  position: absolute; inset: 0 auto 0 0;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
  transition: width 0.8s cubic-bezier(.2,.8,.2,1);
}
.sp-desc {
  margin-top: 8px;
  font-size: 12px;
  color: var(--ink-dim);
  font-family: var(--f-body);
}

.changelog {
  display: grid;
  gap: 0;
  border-top: 1px solid var(--rule);
  margin-top: 14px;
}
.cl-row {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 18px;
  padding: 14px 0;
  border-bottom: 1px solid var(--rule);
  align-items: baseline;
}
.cl-date {
  font-family: var(--f-mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.cl-text {
  font-size: 14px;
  color: var(--ink);
  line-height: 1.5;
}

/* ───────────── edit mode · editable fields ───────────── */
.editable {
  cursor: text;
  border-bottom: 1px dashed transparent;
  transition: border-color .15s, background .15s;
  padding: 0 2px;
  margin: 0 -2px;
  border-radius: 2px;
}
.editable:hover {
  border-bottom-color: color-mix(in oklab, var(--accent) 60%, transparent);
  background: color-mix(in oklab, var(--accent) 6%, transparent);
}
.editable-empty {
  color: var(--ink-faint);
  font-style: italic;
}
.editable-input {
  font: inherit;
  color: inherit;
  background: color-mix(in oklab, var(--accent) 8%, var(--bg-2));
  border: 1px solid var(--accent);
  padding: 2px 6px;
  border-radius: 3px;
  outline: none;
  width: 100%;
  box-sizing: border-box;
  margin: 0 -6px;
}
.editable-input.area {
  min-height: 80px;
  resize: vertical;
  line-height: 1.55;
  font-family: var(--f-body);
  padding: 10px 12px;
  margin: 0;
}
.editable-select {
  font: inherit;
  color: inherit;
  background: transparent;
  border: 1px dashed color-mix(in oklab, var(--accent) 50%, transparent);
  border-radius: 999px;
  padding: 4px 10px 4px 22px;
  cursor: pointer;
  appearance: none;
  background-image: none;
}

/* progress row */
.prog-row {
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 14px;
  align-items: center;
}
.prog-label {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-dim);
}
.prog-bar {
  height: 2px;
  background: var(--rule);
  position: relative;
  overflow: hidden;
}
.prog-fill {
  position: absolute;
  inset: 0 auto 0 0;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
  transition: width .8s cubic-bezier(.2,.8,.2,1);
}
.prog-val {
  font-family: var(--f-mono);
  font-size: 12px;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
  min-width: 3ch;
  text-align: right;
}
.prog-slider {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 2px;
  background: var(--rule);
  outline: none;
  padding: 0;
  margin: 0;
}
.prog-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg);
  box-shadow: 0 0 0 1px var(--accent), 0 0 12px var(--accent-glow);
  cursor: grab;
}
.prog-slider::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg);
  cursor: grab;
}

/* card-level progress row (within project grid card) */
.card-progress {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 12px;
  margin-top: 8px;
}
.cp-bar {
  height: 2px;
  background: var(--rule);
  position: relative;
  overflow: hidden;
}
.cp-fill {
  position: absolute;
  inset: 0 auto 0 0;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
  transition: width .8s cubic-bezier(.2,.8,.2,1);
}
.cp-val {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}

/* subproject delete + add */
.subproject { position: relative; }
.sp-del {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1px solid var(--rule);
  background: transparent;
  color: var(--ink-dim);
  cursor: pointer;
  font-size: 14px;
  line-height: 1;
  display: grid;
  place-items: center;
}
.sp-del:hover {
  border-color: var(--danger);
  color: var(--danger);
}

/* btn variants */
.btn.ghost {
  background: transparent;
  color: var(--ink-dim);
  border: 1px dashed var(--rule);
}
.btn.ghost:hover {
  color: var(--ink);
  border-color: var(--ink-dim);
  border-style: solid;
}
.btn.danger {
  background: var(--danger);
  color: #1a0606;
  border: 1px solid var(--danger);
}
.btn.danger.ghost {
  background: transparent;
  color: var(--danger);
  border: 1px solid color-mix(in oklab, var(--danger) 40%, transparent);
}
.btn.danger.ghost:hover {
  background: color-mix(in oklab, var(--danger) 15%, transparent);
}

/* ───────────── auth modal ───────────── */
.auth-scrim {
  position: fixed;
  inset: 0;
  background: color-mix(in oklab, var(--bg) 85%, black);
  backdrop-filter: blur(20px) saturate(120%);
  display: grid;
  place-items: center;
  z-index: 100;
  animation: scrim-in .3s ease;
}
@keyframes scrim-in { from { opacity: 0; } to { opacity: 1; } }
.auth-card {
  width: min(440px, 90vw);
  background: var(--bg-2);
  border: 1px solid var(--rule);
  padding: 48px 44px 36px;
  animation: card-in .45s cubic-bezier(.2,.8,.2,1);
}
@keyframes card-in {
  from { opacity: 0; transform: translateY(14px) scale(.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.auth-eyebrow {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 18px;
}
.auth-title {
  font-family: var(--f-display);
  font-weight: 300;
  font-size: 36px;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin: 0 0 14px;
}
.auth-title em { color: var(--accent); font-style: italic; }
.auth-sub {
  color: var(--ink-dim);
  font-size: 14px;
  line-height: 1.55;
  margin: 0 0 26px;
}
.auth-label {
  display: block;
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-dim);
  margin-bottom: 16px;
}
.auth-label input {
  display: block;
  width: 100%;
  margin-top: 8px;
  padding: 12px 14px;
  background: var(--bg);
  border: 1px solid var(--rule);
  border-radius: 3px;
  color: var(--ink);
  font: 400 15px var(--f-body);
  letter-spacing: 0;
  text-transform: none;
  outline: none;
  transition: border-color .2s;
  box-sizing: border-box;
}
.auth-label input:focus { border-color: var(--accent); }
.auth-err {
  color: var(--danger);
  font-size: 13px;
  margin: -6px 0 16px;
  font-family: var(--f-body);
}
.auth-actions {
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-top: 6px;
}
.auth-swap {
  background: none;
  border: 0;
  color: var(--ink-dim);
  font-family: var(--f-body);
  font-size: 13px;
  cursor: pointer;
  padding: 6px 0;
  text-align: left;
}
.auth-swap:hover { color: var(--accent); }

/* Google sign-in button */
.google-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 13px 18px;
  background: #fff;
  color: #1f1f1f;
  border: 1px solid #dadce0;
  border-radius: 4px;
  font: 500 14px/1 "Inter Tight", system-ui, sans-serif;
  letter-spacing: 0.01em;
  cursor: pointer;
  transition: box-shadow .2s, background .2s;
  margin-bottom: 18px;
}
.google-btn:hover {
  box-shadow: 0 1px 3px rgba(60,64,67,.3), 0 1px 2px rgba(60,64,67,.15);
  background: #f8f9fa;
}
.google-btn svg { flex-shrink: 0; }

.auth-hint {
  font-size: 12px;
  color: var(--ink-dim);
  line-height: 1.6;
  margin: 0 0 22px;
  padding: 12px 14px;
  background: color-mix(in oklab, var(--accent) 4%, transparent);
  border-left: 2px solid color-mix(in oklab, var(--accent) 40%, var(--rule));
}
.auth-hint strong { color: var(--ink); font-weight: 500; }
.auth-hint code {
  font-family: var(--f-mono);
  font-size: 11px;
  color: var(--accent);
  background: color-mix(in oklab, var(--accent) 8%, transparent);
  padding: 1px 5px;
  border-radius: 2px;
}

/* nav session chip */
.nav-signin {
  background: transparent;
  border: 1px solid var(--rule);
  color: var(--ink-dim);
  padding: 7px 14px 7px 12px;
  border-radius: 999px;
  cursor: pointer;
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: all .2s;
}
.nav-signin:hover {
  color: var(--ink);
  border-color: var(--accent);
}
.nav-signin .dot.dim { background: var(--ink-faint); box-shadow: none; }

.nav-session {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 4px 6px 4px 4px;
  border: 1px solid var(--rule);
  border-radius: 999px;
  background: var(--bg-2);
}
.nav-avatar {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: color-mix(in oklab, var(--accent) 25%, var(--bg-2));
  color: var(--accent);
  display: grid;
  place-items: center;
  font-family: var(--f-mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.06em;
  border: 1px solid var(--accent);
}
.nav-session-body {
  line-height: 1.1;
  min-width: 0;
}
.nav-session-name {
  font-family: var(--f-body);
  font-size: 12px;
  color: var(--ink);
  font-weight: 500;
}
.nav-session-email {
  font-family: var(--f-mono);
  font-size: 10px;
  color: var(--ink-dim);
  letter-spacing: 0.04em;
}
.nav-signout {
  background: transparent;
  border: 0;
  color: var(--ink-dim);
  cursor: pointer;
  padding: 4px 8px;
  font-size: 14px;
  transform: rotate(180deg);
}
.nav-signout:hover { color: var(--accent); }

/* ───────────── activity feed ───────────── */
.activity-list {
  margin-top: 28px;
  border-top: 1px solid var(--rule);
}
.a-row {
  display: grid;
  grid-template-columns: 110px 20px 1fr;
  gap: 16px;
  padding: 14px 0;
  border-bottom: 1px solid var(--rule);
  align-items: baseline;
  font-size: 14px;
  line-height: 1.5;
}
.a-when {
  font-family: var(--f-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--ink-dim);
  text-transform: uppercase;
}
.a-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent-glow);
  align-self: center;
  justify-self: center;
}
.a-dot[data-kind="auth"] { background: var(--ink-dim); box-shadow: none; }
.a-dot[data-kind="sub"]  { background: color-mix(in oklab, var(--accent) 60%, var(--warn)); }
.a-text {
  color: var(--ink);
  font-family: var(--f-body);
}
.a-text strong { font-weight: 500; color: var(--ink); }
.a-text em     { color: var(--accent); font-style: normal; }
.a-field { color: var(--ink-dim); font-family: var(--f-mono); font-size: 12px; }
.a-diff  { color: var(--ink-dim); font-family: var(--f-mono); font-size: 12px; display: block; margin-top: 4px; }
.a-diff s { color: var(--ink-faint); }

/* overlay recent edits */
.ov-edits {
  display: grid;
  gap: 8px;
  margin-top: 12px;
}
.ov-edit {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 14px;
  font-size: 12px;
  color: var(--ink-dim);
  line-height: 1.5;
}
.ov-edit-when {
  font-family: var(--f-mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.ov-edit-body strong { color: var(--ink); font-weight: 500; }
.ov-edit-body em     { color: var(--accent); font-style: normal; }

/* progress row inside overlay */
.ov-progress { margin-top: 10px; }

/* responsive tweaks */
@media (max-width: 900px) {
  .manifesto, .arch, .projects-head { grid-template-columns: 1fr; }
  .telem-grid { grid-template-columns: repeat(2, 1fr); }
  .team-grid { grid-template-columns: repeat(2, 1fr); }
  .log { grid-column: span 2; }
  .tl-row { grid-template-columns: 80px 1fr; }
  .tl-row .d, .tl-row .tag { grid-column: span 2; }
  .project-card { grid-column: span 12; }
  .nav-links { display: none; }
}


/* ═══════════════════════════════════════════════════════════════
   LIQUID GLASS — performant build
   Static chromatic edges, lower blur, animations gated to hover.
   Aurora uses transform only (no filter re-computation).
   ═══════════════════════════════════════════════════════════════ */

[data-surface="liquid"] {
  --glass-bg:     color-mix(in oklab, var(--accent) 6%, rgba(12, 16, 26, 0.5));
  --glass-bg-lt:  color-mix(in oklab, var(--accent) 3%, rgba(255,255,255, 0.55));
  --glass-edge:   color-mix(in oklab, var(--accent) 45%, rgba(255,255,255, 0.22));
  --glass-stroke: color-mix(in oklab, var(--accent) 22%, rgba(255,255,255, 0.10));
  --glass-blur:   14px;   /* cards / cells */
  --glass-blur-lg: 22px;  /* overlay only */
}
[data-surface="liquid"][data-theme="light"] {
  --glass-bg:     var(--glass-bg-lt);
  --glass-stroke: color-mix(in oklab, var(--accent) 30%, rgba(0,0,0, 0.08));
}

/* ---------- aurora — one soft gradient, transform-only motion ---------- */
[data-surface="liquid"] body::before {
  content: "";
  position: fixed;
  inset: -10vmax;
  z-index: -2;
  background:
    radial-gradient(42vmax 32vmax at 22% 28%, color-mix(in oklab, var(--accent) 38%, transparent), transparent 62%),
    radial-gradient(36vmax 34vmax at 78% 22%, color-mix(in oklab, var(--accent) 24%, #ff66aa) 0%, transparent 60%),
    radial-gradient(48vmax 38vmax at 55% 82%, color-mix(in oklab, var(--accent) 28%, #7a5bff) 0%, transparent 65%);
  opacity: 0.45;
  will-change: transform;
  animation: aurora-drift 60s ease-in-out infinite alternate;
  pointer-events: none;
}
[data-surface="liquid"][data-theme="light"] body::before { opacity: 0.35; mix-blend-mode: multiply; }

@keyframes aurora-drift {
  0%   { transform: translate3d(-2%, -1%, 0); }
  100% { transform: translate3d(2%, 1%, 0); }
}
@media (prefers-reduced-motion: reduce) {
  [data-surface="liquid"] body::before { animation: none; }
}

[data-surface="liquid"] body { background: var(--bg); }
[data-surface="liquid"] .telemetry { background: transparent; }

/* ═════════════════ PROJECT CARDS ═════════════════ */
[data-surface="liquid"] .projects-grid {
  background: transparent;
  border: 0;
  gap: 18px;
}
[data-surface="liquid"] .project-card {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--glass-stroke);
  border-radius: 20px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.14),
    inset 0 -1px 0 rgba(0,0,0,0.22),
    0 20px 50px -22px rgba(0,0,0,0.5);
  transition: transform .35s cubic-bezier(.2,.8,.2,1), box-shadow .35s;
}

/* Static chromatic edge — drawn once, no animation.
   Single pseudo; small, cheap. */
[data-surface="liquid"] .project-card::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(
    135deg,
    color-mix(in oklab, var(--accent) 80%, #fff) 0%,
    transparent 30%,
    color-mix(in oklab, var(--accent) 40%, #ff5ecf) 55%,
    transparent 75%,
    color-mix(in oklab, var(--accent) 60%, #7af7ff) 100%
  );
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
          mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  opacity: 0.5;
  pointer-events: none;
  z-index: 1;
}

/* Specular sweep — only on hover, fades in. No continuous animation. */
[data-surface="liquid"] .project-card::after {
  content: "";
  position: absolute; inset: 0;
  border-radius: inherit;
  background: linear-gradient(
    135deg,
    transparent 35%,
    rgba(255,255,255,0.14) 50%,
    transparent 65%
  );
  opacity: 0;
  transition: opacity .35s;
  pointer-events: none;
  z-index: 1;
}
[data-surface="liquid"] .project-card > * { z-index: 3; position: relative; }

[data-surface="liquid"] .project-card:hover {
  transform: translateY(-3px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.22),
    0 30px 70px -22px rgba(0,0,0,0.65),
    0 0 0 1px color-mix(in oklab, var(--accent) 25%, transparent);
}
[data-surface="liquid"] .project-card:hover::after { opacity: 1; }

/* ═════════════════ TELEMETRY / LOG / TEAM ═════════════════ */
[data-surface="liquid"] .telem-grid,
[data-surface="liquid"] .team-grid {
  background: transparent;
  border: 0;
  gap: 12px;
}
[data-surface="liquid"] .telem-cell,
[data-surface="liquid"] .log,
[data-surface="liquid"] .team-cell {

  border-radius: 16px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.12),
    0 16px 40px -20px rgba(0,0,0,0.4);
}
[data-surface="liquid"] .log::after {

}

/* ═════════════════ OVERLAY (project detail) ═════════════════ */
[data-surface="liquid"] .overlay-scrim {
  background: color-mix(in oklab, var(--bg) 65%, transparent);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
[data-surface="liquid"] .overlay-panel {
  background: var(--glass-bg);
  backdrop-filter: blur(var(--glass-blur-lg)) saturate(1.3);

  border-left: 1px solid var(--glass-stroke);
  border-radius: 24px 0 0 24px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.18),
    inset 1px 0 0 rgba(255,255,255,0.10),
    0 30px 80px -30px rgba(0,0,0,0.55),
    0 0 0 1px color-mix(in oklab, var(--accent) 12%, transparent);
}

/* Edge specular — single gradient, no animation */
[data-surface="liquid"] .overlay-panel::after {
  content: "";
  position: absolute; inset: 0;
  border-radius: inherit;
  pointer-events: none;
  background: linear-gradient(140deg,
    rgba(255,255,255,0.12) 0%,
    transparent 18%, transparent 82%,
    rgba(255,255,255,0.05) 100%);
  z-index: 2;
}

[data-surface="liquid"] .subproject {
  background: color-mix(in oklab, var(--accent) 6%, rgba(255,255,255,0.03));

}

/* ═════════════════ TREE NODES (glass orbs) ═════════════════ */
[data-surface="liquid"] .tree-node-pill {

/* ═════════════════ TWEAKS / AUTH / ARCH ═════════════════ */

[data-surface="liquid"] .auth-card {
